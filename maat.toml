# MAAT configuration — safe to commit (no secrets here).
# For local overrides, use maat.workspace.toml (gitignored).

[llm]
# model = "openai/gpt-5-mini"
model = "x-ai/grok-4.20-beta"
base_url = "https://openrouter.ai/api/v1"

[llm.routing]
intent_classifier_profile = "gemini_flash"
capability_nudge_profile = "gemini_flash"

[llm.routing.routes."intent:image_generate"]
prefer_profiles = ["image_preview"]
fallback_profile = "image_preview"

[llm.routing.routes."intent:image_edit"]
prefer_profiles = ["image_preview"]
fallback_profile = "image_preview"

[llm.profiles.image_preview]
provider = "openrouter"
model_id = "google/gemini-3.1-flash-image-preview"
temperature = 0.4
max_tokens = 4096
tags = ["image", "generate", "edit"]

[llm.profiles.gemini_flash]
provider = "openrouter"
model_id = "google/gemini-2.5-flash"
temperature = 0.4
max_tokens = 4096
tags = ["fast", "cheap", "routing"]

[llm.profiles.codex]
provider = "openrouter"
model_id = "openai/gpt-5.3-codex"
temperature = 0.2
max_tokens = 8192
tags = ["coding", "agentic"]

[llm.profiles.claude_sonnet]
provider = "openrouter"
model_id = "anthropic/claude-sonnet-4.5"
temperature = 0.4
max_tokens = 8192
tags = ["reasoning", "writing"]

[llm.profiles.deepseek_v3]
provider = "openrouter"
model_id = "deepseek/deepseek-v3.2"
temperature = 0.3
max_tokens = 8192
tags = ["reasoning", "budget"]

[[llm.routing.support_rules]]
match_any_terms = ["mail", "email", "send", "attach", "attachment"]
capability_ids = ["gmail_send"]

[[llm.routing.support_rules]]
match_any_terms = ["write", "save", "draft", "export", "pdf", "attachment"]
capability_ids = ["file_write"]

[[llm.routing.support_rules]]
match_any_terms = ["read", "review", "inspect", "check", "open", "input", "source", "attachment"]
capability_ids = ["file_read"]

[[llm.routing.support_rules]]
match_any_terms = ["list", "browse", "folder", "directory", "files"]
capability_ids = ["file_list"]

[memory]
db_path = "maat.db"

# Uncomment and fill in to enable IMAP email reading.
# Credentials go in maat.workspace.toml or via /secret set.
#
# [imap]
# host     = "imap.gmail.com"
# port     = 993
# username = "you@gmail.com"
# # password is looked up via secret key (default: maat/imap/password)

# Uncomment and fill in to enable Google OAuth (gmail_send etc).
# Client secret goes in secret store, not here.
#
[google]
client_id = "739895888671-bu5purfiblr49rrqmhcda7dkqb0uaef5.apps.googleusercontent.com"

# Optional Telegram herald.
# Bot token is resolved from the secret store key below or from TELEGRAM_BOT_TOKEN.
#
# [telegram]
# enabled = true
# default_chat_id = 123456789
# poll_seconds = 5
# download_dir = "tmp/telegram"
#
# [users.principals.owner]
# display_name = "Owner"
# role = "owner"
# permissions = ["*"]
#
# [[users.telegram]]
# principal = "owner"
# user_id = 123456789
# allowed_chat_ids = [123456789]
# can_instruct = true

[secrets]
# Uncomment to use 1Password as the primary secret store.
# onepassword_vault = "MAAT"
#
# Uncomment to use an encrypted file as fallback (useful on headless servers).
# encrypted_file_path = "maat.secrets.enc"
